name: Release

run-name: Release ${{ inputs.bump_type }}

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: read

jobs:
  prereq:
    uses: alexdlaird/.github/.github/workflows/release-prereq.yml@main
    with:
      bump_type: ${{ inputs.bump_type }}
      version_file: 'hookee/__init__.py'
      version_pattern: 's/^__version__ = ".*"/__version__ = "${VERSION}"/'
      repo_slug: alexdlaird/hookee
    secrets:
      bot_app_id: ${{ secrets.RELEASE_BOT_APP_ID }}
      bot_private_key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

  build:
    needs: prereq
    uses: alexdlaird/hookee/.github/workflows/build.yml@main
    secrets: inherit

  release:
    needs: [prereq, build]
    runs-on: ubuntu-latest

    env:
      FORCE_COLOR: 1
      PYTHONUNBUFFERED: 1

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prereq.outputs.squash_commit_sha }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.prereq.outputs.version }}
          SHA: ${{ needs.prereq.outputs.squash_commit_sha }}
          RELEASE_NOTES: ${{ needs.prereq.outputs.release_notes }}
        run: |
          gh release create "$VERSION" \
            --target "$SHA" \
            --title "$VERSION" \
            --notes "$RELEASE_NOTES"

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: make upload

  cleanup:
    needs: [prereq, release]
    if: always() && needs.prereq.result == 'success'
    uses: alexdlaird/.github/.github/workflows/release-cleanup.yml@main
    with:
      squash_boundary: ${{ needs.prereq.outputs.squash_boundary }}
    secrets:
      bot_app_id: ${{ secrets.RELEASE_BOT_APP_ID }}
      bot_private_key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
